name: Generate RSS

on:
  schedule:
    - cron: "*/30 * * * *"  # Draait elke 30 minuten
  workflow_dispatch:        # Hiermee kun je handmatig starten

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Haal de code van de repo
      - uses: actions/checkout@v3

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # Installeer packages
      - name: Install packages
        run: pip install -r requirements.txt

      # Draai het script
      - name: Run script
        run: python generate_rss.py

      # Commit en push feed.xml terug naar repo
      - name: Commit and push feed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add feed.xml
          git commit -m "Update RSS" || echo "Nothing to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/AlexHetzelfde/RSS-Feeds.git
